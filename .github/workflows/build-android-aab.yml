name: Build Hum Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Validate Android signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing Android signing secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          echo "Android signing secrets present: yes"

      - name: Sync Capacitor Android
        run: npm run android:sync

      - name: Configure Android release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          signing_dir="$RUNNER_TEMP/android-signing"
          keystore_path="$signing_dir/upload-keystore.jks"

          mkdir -p "$signing_dir"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          printf '%s\n' \
            "storeFile=$keystore_path" \
            "storePassword=$ANDROID_KEYSTORE_PASSWORD" \
            "keyAlias=$ANDROID_KEY_ALIAS" \
            "keyPassword=$ANDROID_KEY_PASSWORD" \
            > android/key.properties

          echo "Android release signing configured."
          echo "Signing config path: android/key.properties"

      - name: Build release AAB
        run: |
          chmod +x android/gradlew
          npm run android:build:aab

      - name: Validate signed release AAB
        run: |
          aab_path="$(find android/app/build/outputs/bundle/release -name '*.aab' -print -quit)"
          if [ -z "$aab_path" ] || [ ! -f "$aab_path" ]; then
            echo "Signed release AAB not found."
            exit 1
          fi

          echo "Artifact path: $aab_path"
          echo "File size bytes: $(stat -c%s "$aab_path")"
          echo "Release task used: ./gradlew bundleRelease"
          echo "Signing config path used: android/key.properties"
          echo "Signing secrets present: yes"

          jarsigner -verify -verbose -certs "$aab_path" > "$RUNNER_TEMP/aab-jarsigner.txt"
          if grep -q "CN=Android Debug" "$RUNNER_TEMP/aab-jarsigner.txt"; then
            echo "AAB appears to be debug-signed; refusing to upload."
            exit 1
          fi

          grep -E "jar verified|signed by|X.509" "$RUNNER_TEMP/aab-jarsigner.txt" || true
          echo "AAB signing verification passed."

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: hum-android-aab-signed
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
